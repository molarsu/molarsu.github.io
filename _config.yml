# Site Settings
locale                   : "en-US"
title                    : "Tongrui Su"
title_separator          : "-"
name                     : &name "Tongrui Su"
description              : &description "Tongrui Su's personal website"
url                      : https://molarsu.github.io
baseurl                  : ""
repository               : "molarsu/molarsu.github.io"
teaser                   : "avatar.jpg"
breadcrumbs              : false
words_per_minute         : 160
future                   : false
read_more                : "disabled"
talkmap_link             : false

comments:
  provider               :
  disqus:
    shortname            :
  discourse:
    server               :
  facebook:
    appid                :
    num_posts            :
    colorscheme          :

staticman:
  allowedFields          : ['name', 'email', 'url', 'message']
  branch                 : "gh-pages"
  commitMessage          : "New comment."
  filename               : comment-{@timestamp}
  format                 : "yml"
  moderation             : true
  path                   : "_data/comments/{options.slug}"
  requiredFields         : ['name', 'email', 'message']
  transforms:
    email                : "md5"
  generatedFields:
    date:
      type               : "date"
      options:
        format           : "iso8601"

atom_feed:
  path                   :

google_site_verification :
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :

twitter:
  username               :
facebook:
  username               :
  app_id                 :
  publisher              :
og_image                 :
social:
  type                   : "Person"
  name                   : "Tongrui Su"
  links:
    - "https://github.com/molarsu"

analytics:
  provider               : false
  google:
    tracking_id          :

author:
  name             : "Tongrui Su"
  avatar           : "avatar.jpg"
  bio              : "M.S. Student, Institute of Computing Technology, Chinese Academy of Sciences"
  location         : "Beijing, China"
  employer         : "Advised by Prof. Wei Chen"
  pubmed           :
  googlescholar    :
  email            : "molarsu18@gmail.com"
  researchgate     :
  uri              : "https://molarsu.github.io/"
  bitbucket        :
  codepen          :
  dribbble         :
  flickr           :
  facebook         :
  foursquare       :
  github           : "molarsu"
  google_plus      :
  keybase          :
  instagram        :
  impactstory      :
  lastfm           :
  linkedin         :
  orcid            :
  pinterest        :
  soundcloud       :
  stackoverflow    :
  steam            :
  tumblr           :
  twitter          :
  vine             :
  weibo            :
  xing             :
  youtube          :
  wikipedia        :

include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - CONTRIBUTING.md
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - markdown_generator
  - talkmap
  - talkmap.ipynb
  - talkmap.py
  - tmp
  - vendor

keep_files:
  - .git
  - .svn

encoding                  : "utf-8"
markdown_ext              : "markdown,mkdown,mkdn,mkd,md"

markdown                  : kramdown
highlighter               : rouge
lsi                       : false
excerpt_separator         : "\n\n"
incremental               : false

kramdown:
  input                   : GFM
  hard_wrap               : false
  auto_ids                : true
  footnote_nr             : 1
  entity_output           : as_char
  toc_levels              : 1..6
  smart_quotes            : lsquo,rsquo,ldquo,rdquo
  enable_coderay          : false

collections:
  teaching:
    output                : false
    permalink             : /:collection/:path/
  publications:
    output                : false
    permalink             : /:collection/:path/
  portfolio:
    output                : false
    permalink             : /:collection/:path/
  talks:
    output                : false
    permalink             : /:collection/:path/

defaults:
  - scope:
      path                : ""
      type                : posts
    values:
      layout              : single
      author_profile      : true
      read_time           : true
      comments            : false
      share               : false
      related             : false
  - scope:
      path                : ""
      type                : pages
    values:
      layout              : single
      author_profile      : true
  - scope:
      path                : ""
      type                : publications
    values:
      layout              : single
      author_profile      : true
      share               : false
      comments            : false
  - scope:
      path                : ""
      type                : portfolio
    values:
      layout              : single
      author_profile      : true
      share               : false
      comment             : false
  - scope:
      path                : ""
      type                : talks
    values:
      layout              : talk
      author_profile      : true
      share               : false

sass:
  sass_dir                : _sass
  style                   : compressed

permalink                 : /:categories/:title/
timezone                  : Asia/Shanghai

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

category_archive:
  type                    : liquid
  path                    : /categories/

tag_archive:
  type                    : liquid
  path                    : /tags/

compress_html:
  clippings               : all
  ignore:
    envs                  : development
